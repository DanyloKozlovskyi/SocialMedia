name: Build and deploy .NET Core application to Web App app-socialmedia-api

on:
  push:
    branches:
      - feature/add-chat-between-users
      - master
    paths:
      - 'api/**'
      - '.github/workflows/app-socialmedia-api.yml'

env:
  AZURE_WEBAPP_NAME: app-socialmedia-api
  AZURE_WEBAPP_PACKAGE_PATH: 'publish'
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 8.0.x
  WORKING_DIRECTORY: api/SocialMedia.WebApi
  SOLUTION_PATH: api/SocialMedia.sln

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish
        run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Apply Entity Framework migrations
        env:
          ConnectionStrings__Default: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          for i in {1..5}; do
            if dotnet ef database update --project api/SocialMedia.Infrastructure --startup-project api/SocialMedia.WebApi; then
              break
            fi
            if [ $i -eq 5 ]; then
              echo "Failed to update database after 5 attempts."
              exit 1
            fi
            echo "Attempt $i failed! Retrying in 15s..."
            sleep 15
          done

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} 
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
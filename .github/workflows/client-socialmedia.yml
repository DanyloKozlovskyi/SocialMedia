name: Build and deploy Next.js client

on:
  push:
    branches:
      - master
    paths:
      - "client/**" # Change 'client' if your folder has a different name
      - ".github/workflows/client-socialmedia.yml"

env:
  AZURE_WEBAPP_NAME: app-socialmedia-client
  WORKING_DIRECTORY: client # Change 'client' if your folder has a different name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Build Next.js
        run: yarn build
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Prepare Standalone Artifact
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cd .next/standalone
          zip -r ../../release.zip .
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          path: ${{ env.WORKING_DIRECTORY }}/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_CLIENT_PUBLISH_PROFILE }}
          package: release.zip
